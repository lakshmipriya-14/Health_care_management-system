<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - HealthPlus</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-wrapper" style="padding: 4rem 2rem;">
        <div class="auth-card" style="max-width: 650px;">
            <a href="/" class="logo">
                <i class="fa-solid fa-square-plus"></i> HealthPlus
            </a>
            <h2>Create an Account</h2>
            <p>Join us today to easily book your checkups and manage your health.</p>
            
            <div id="authError" class="error-msg" style="display: none; margin-bottom: 1rem; color: var(--error); font-weight: 600; font-size: 0.95rem;"></div>

            <form id="registerForm" style="text-align: left;" novalidate>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div class="form-group">
                        <label for="name">Full Name <span class="req">*</span></label>
                        <input type="text" id="name" name="name" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address <span class="req">*</span></label>
                        <input type="email" id="email" name="email" placeholder="john@example.com" required>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div class="form-group">
                        <label for="password">Password <span class="req">*</span></label>
                        <input type="password" id="password" name="password" placeholder="Min. 6 characters" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number <span class="req">*</span></label>
                        <input type="tel" id="phone" name="phone" placeholder="555-123-4567" required>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div class="form-group">
                        <label for="age">Age <span class="req">*</span></label>
                        <input type="number" id="age" name="age" placeholder="e.g. 30" required>
                    </div>
                    <div class="form-group mb-4">
                        <label for="gender">Gender <span class="req">*</span></label>
                        <div style="position: relative;">
                            <select id="gender" name="gender" required>
                                <option value="" disabled selected>Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                                <option value="Prefer not to say">Prefer not to say</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" id="registerBtn">
                    <span class="btn-text">Register Now</span> <i class="fa-solid fa-user-plus"></i>
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="/login.html">Log in here</a>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    <script src="/js/auth.js"></script>
</body>
</html>
