<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HealthPlus</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <a href="/" class="logo">
                <i class="fa-solid fa-square-plus"></i> HealthPlus
            </a>
            <h2>Welcome Back</h2>
            <p>Log in to manage your appointments and records.</p>
            
            <div id="authError" class="error-msg" style="display: none; margin-bottom: 1rem; color: var(--error); font-weight: 600; font-size: 0.95rem;"></div>

            <form id="loginForm" class="text-left" novalidate>
                <div class="form-group">
                    <label for="email">Email Address <span class="req">*</span></label>
                    <input type="email" id="email" name="email" placeholder="example@healthplus.com" required>
                </div>
                <div class="form-group mb-4">
                    <label for="password">Password <span class="req">*</span></label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
                    <span class="btn-text">Sign In</span> <i class="fa-solid fa-right-to-bracket"></i>
                </button>
            </form>

            <div class="auth-footer">
                Don't have a patient account? <a href="/register.html">Register here</a>
            </div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    <script src="/js/auth.js"></script>
</body>
</html>
